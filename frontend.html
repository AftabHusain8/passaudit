<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PassAudit - Password Strength Auditor</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>

<style>
/* ── Variables ─────────────────────────────────────────────────── */
:root {
  --bg:        #050607;
  --surface:   #09100f;
  --surface2:  #0d1714;
  --border:    #1a2e28;
  --border-hi: #2a4a3e;

  --amber:     #f5a623;
  --amber-lo:  #7a4f08;
  --amber-hi:  #ffc846;
  --amber-dim: rgba(245,166,35,0.12);

  --green:     #00ff9d;
  --green-lo:  #006640;
  --red:       #ff3b5c;
  --red-lo:    #5c0017;
  --yellow:    #ffe066;
  --blue:      #00d4ff;

  --text:      #c8d8cc;
  --dim:       #3d5a4e;

  --mono: 'IBM Plex Mono', monospace;
  --head: 'Orbitron', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Hex grid background ─────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(0,255,157,0.03) 0%, transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(245,166,35,0.04) 0%, transparent 50%),
    linear-gradient(rgba(245,166,35,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,166,35,0.015) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
  pointer-events: none;
  z-index: 0;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

#root { position: relative; z-index: 1; }

/* ── Layout ──────────────────────────────────────────────────────── */
.app {
  max-width: 880px;
  margin: 0 auto;
  padding: 36px 20px 80px;
}

/* ── Header ──────────────────────────────────────────────────────── */
.header {
  margin-bottom: 44px;
  animation: fadeDown 0.7s ease both;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.brand-name {
  font-family: var(--head);
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 8px;
  color: var(--amber);
  text-shadow: 0 0 30px rgba(245,166,35,0.5), 0 0 80px rgba(245,166,35,0.15);
  line-height: 1;
}

.brand-tagline {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 4px;
  text-transform: uppercase;
}

.header-meta {
  text-align: right;
}

.meta-author {
  font-family: var(--head);
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 3px;
  opacity: 0.8;
}

.meta-project {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-top: 3px;
}

.header-divider {
  height: 1px;
  background: linear-gradient(90deg, var(--amber-lo), var(--border), transparent);
  margin-top: 16px;
}

/* ── Panel ───────────────────────────────────────────────────────── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative;
  margin-bottom: 20px;
  animation: fadeUp 0.5s ease both;
}

.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--amber-lo), var(--amber), var(--amber-lo));
  opacity: 0.6;
}

.panel-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(245,166,35,0.03);
}

.bar-label {
  font-family: var(--head);
  font-size: 9px;
  color: var(--amber);
  letter-spacing: 4px;
  flex: 1;
}

.bar-status {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 2px;
}

.led {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber);
  animation: pulse-led 2s ease infinite;
}

.led.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.led.red   { background: var(--red);   box-shadow: 0 0 6px var(--red);   animation: pulse-red 1s ease infinite; }

@keyframes pulse-led { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.6} }

.panel-body { padding: 24px; }

/* ── Input ───────────────────────────────────────────────────────── */
.input-row {
  display: flex;
  gap: 0;
  border: 1px solid var(--border-hi);
  background: rgba(0,0,0,0.4);
  margin-bottom: 16px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.input-row:focus-within {
  border-color: var(--amber-lo);
  box-shadow: 0 0 0 1px var(--amber-lo), inset 0 0 20px rgba(245,166,35,0.03);
}

.input-prefix {
  display: flex; align-items: center;
  padding: 0 14px;
  color: var(--amber);
  font-size: 12px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  background: var(--amber-dim);
  user-select: none;
}

.pw-input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 14px;
  color: #e8f0ec;
  letter-spacing: 3px;
}

.pw-input::placeholder { color: var(--dim); letter-spacing: 1px; font-size: 12px; }

.btn-toggle {
  display: flex; align-items: center;
  padding: 0 14px;
  background: transparent;
  border: none;
  border-left: 1px solid var(--border);
  color: var(--dim);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  transition: color 0.2s, background 0.2s;
}
.btn-toggle:hover { color: var(--amber); background: var(--amber-dim); }

/* ── Analyze button ──────────────────────────────────────────────── */
.btn-analyze {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--amber-lo);
  color: var(--amber);
  font-family: var(--head);
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, color 0.3s;
}

.btn-analyze-inner {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
}

.btn-analyze::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--amber);
  transform: translateX(-101%);
  transition: transform 0.35s ease;
}

.btn-analyze:hover { border-color: var(--amber); color: var(--bg); }
.btn-analyze:hover::before { transform: translateX(0); }
.btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

/* ── Loading bar ─────────────────────────────────────────────────── */
.loading-bar {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
  background-size: 200% 100%;
  animation: scan 1s linear infinite;
  margin-top: 14px;
}
.loading-text {
  font-size: 11px; color: var(--amber); letter-spacing: 3px;
  margin-top: 10px; display: flex; align-items: center; gap: 10px;
}
@keyframes scan { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Error ───────────────────────────────────────────────────────── */
.error-box {
  margin-top: 14px;
  padding: 12px 16px;
  border: 1px solid rgba(255,59,92,0.4);
  background: rgba(255,59,92,0.06);
  color: var(--red);
  font-size: 11px;
  letter-spacing: 1px;
  line-height: 1.6;
}

/* ── Results grid ────────────────────────────────────────────────── */
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}

@media (max-width: 600px) { .results-grid { grid-template-columns: 1fr; } }

/* ── Score ring block ────────────────────────────────────────────── */
.score-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 24px;
  background: var(--surface2);
  border: 1px solid var(--border);
}

.score-ring-wrap {
  position: relative;
  width: 110px; height: 110px;
}

.score-ring-wrap svg { transform: rotate(-90deg); }

.score-ring-bg  { fill: none; stroke: var(--border); stroke-width: 6; }
.score-ring-fill {
  fill: none;
  stroke-width: 6;
  stroke-linecap: butt;
  transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1), stroke 0.5s;
}

.score-center {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
}

.score-num {
  font-family: var(--head);
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
}

.score-max {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 2px;
}

.score-level {
  font-family: var(--head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
}

.entropy-row {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  display: flex; gap: 6px; align-items: center;
}

.entropy-val { color: var(--blue); }

/* ── Checks panel ────────────────────────────────────────────────── */
.checks-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.check-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  padding: 5px 8px;
  border-left: 2px solid transparent;
  transition: background 0.2s;
}

.check-row.ok {
  border-left-color: var(--green);
  background: rgba(0,255,157,0.02);
}

.check-row.fail {
  border-left-color: var(--red);
  background: rgba(255,59,92,0.02);
}

.check-sym { font-size: 12px; width: 16px; flex-shrink: 0; }
.check-lbl { color: var(--dim); flex: 1; letter-spacing: 0.5px; }
.check-row.ok .check-lbl { color: var(--text); }

/* ── Strength bar full-width ─────────────────────────────────────── */
.strength-bar-block { margin-bottom: 20px; }

.bar-row {
  display: flex; justify-content: space-between;
  align-items: baseline; margin-bottom: 8px;
}

.bar-lbl { font-size: 10px; color: var(--dim); letter-spacing: 3px; }
.bar-score { font-size: 10px; color: var(--dim); }

.meter-track {
  height: 4px;
  background: rgba(255,255,255,0.04);
  position: relative;
}

.meter-fill {
  height: 100%;
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1), background 0.5s;
}

/* ── Attack banner ───────────────────────────────────────────────── */
.attack-banner {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 20px;
  margin-bottom: 20px;
  border: 1px solid;
  position: relative;
  overflow: hidden;
}

.attack-banner.cracked {
  border-color: rgba(255,59,92,0.5);
  background: rgba(255,59,92,0.06);
}

.attack-banner.secure {
  border-color: rgba(0,255,157,0.2);
  background: rgba(0,255,157,0.03);
}

.attack-banner.cracked::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(255,59,92,0.05), transparent);
  animation: flicker 3s ease infinite;
}

@keyframes flicker {
  0%,100%{opacity:1} 45%{opacity:0.7} 50%{opacity:1} 55%{opacity:0.8}
}

.attack-icon { font-size: 28px; flex-shrink: 0; }

.attack-title {
  font-family: var(--head);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.attack-sub {
  font-size: 11px;
  color: var(--dim);
  margin-top: 4px;
  letter-spacing: 1px;
}

.attack-word {
  display: inline-block;
  color: var(--red);
  font-weight: 600;
  letter-spacing: 2px;
  background: rgba(255,59,92,0.1);
  padding: 1px 6px;
}

/* ── Stats row ───────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.stat-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 14px;
  text-align: center;
}

.stat-num {
  font-family: var(--head);
  font-size: 18px;
  color: var(--amber);
  display: block;
  margin-bottom: 4px;
}

.stat-lbl { font-size: 9px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; }

/* ── Hash blocks ─────────────────────────────────────────────────── */
.hash-block { margin-bottom: 14px; }

.hash-label {
  font-size: 9px; color: var(--dim);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}

.hash-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.hash-algo-badge {
  font-family: var(--head);
  font-size: 8px;
  color: var(--amber);
  border: 1px solid var(--amber-lo);
  padding: 1px 6px;
  letter-spacing: 2px;
}

.hash-val {
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  padding: 10px 12px;
  font-size: 10px;
  word-break: break-all;
  line-height: 1.7;
  letter-spacing: 1px;
}

.hash-val.sha256 { color: #00d4ff; }
.hash-val.sha512 { color: #7c9cbf; font-size: 9px; }
.hash-val.bcrypt  { color: #9b7cbf; font-size: 9px; }

/* ── Feedback list ───────────────────────────────────────────────── */
.feedback-list { display: flex; flex-direction: column; }

.fb-item {
  display: flex; align-items: flex-start;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 11px;
  line-height: 1.5;
  color: var(--yellow);
  letter-spacing: 0.5px;
}

.fb-item:last-child { border-bottom: none; }
.fb-arrow { color: var(--amber); flex-shrink: 0; margin-top: 1px; }

/* ── Hint block ──────────────────────────────────────────────────── */
.hint-block {
  background: rgba(0,212,255,0.05);
  border: 1px solid rgba(0,212,255,0.15);
  padding: 12px 16px;
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 1px;
  line-height: 1.6;
  display: flex; gap: 10px; align-items: flex-start;
}

/* ── Footer ──────────────────────────────────────────────────────── */
.footer {
  margin-top: 44px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; flex-wrap: wrap;
  gap: 10px;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.footer-credit { color: var(--amber); opacity: 0.7; }

/* ── Animations ──────────────────────────────────────────────────── */
@keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(12px)}  to{opacity:1;transform:translateY(0)} }

.results-enter { animation: fadeUp 0.5s ease both; }

/* Cursor blink */
.cur { display:inline-block; width:7px; height:12px; background:var(--amber); margin-left:3px; vertical-align:middle; animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;
const API = "http://localhost:8000";

// ── Color helpers ─────────────────────────────────────────────────────────────

function levelColor(level) {
  const map = {
    "Very Weak": "#ff3b5c",
    "Weak":      "#ff7043",
    "Medium":    "#ffd60a",
    "Strong":    "#00e676",
    "Excellent": "#00ff9d",
  };
  return map[level] || "#3d5a4e";
}

function scoreGradient(score) {
  if (score < 20)  return "#ff3b5c";
  if (score < 40)  return "#ff7043";
  if (score < 60)  return "#ffd60a";
  if (score < 80)  return "#00e676";
  return "#00ff9d";
}

// ── Score Ring ────────────────────────────────────────────────────────────────

function ScoreRing({ score, level }) {
  const R = 46;
  const circ = 2 * Math.PI * R;
  const offset = circ - (score / 100) * circ;
  const color = levelColor(level);

  return (
    <div className="score-block">
      <div className="score-ring-wrap">
        <svg viewBox="0 0 100 100" width="110" height="110">
          <circle className="score-ring-bg"   cx="50" cy="50" r={R} />
          <circle
            className="score-ring-fill"
            cx="50" cy="50" r={R}
            stroke={color}
            strokeDasharray={circ}
            strokeDashoffset={offset}
            style={{ transition: "stroke-dashoffset 1s ease, stroke 0.5s" }}
          />
        </svg>
        <div className="score-center">
          <span className="score-num" style={{ color }}>{score}</span>
          <span className="score-max">/100</span>
        </div>
      </div>

      <div className="score-level" style={{ color }}>{level}</div>
    </div>
  );
}

// ── Checks Panel ──────────────────────────────────────────────────────────────

const CHECK_DEFS = [
  { key: "length_8",    label: "Length ≥ 8"       },
  { key: "length_12",   label: "Length ≥ 12"      },
  { key: "length_16",   label: "Length ≥ 16"      },
  { key: "has_upper",   label: "Uppercase A–Z"    },
  { key: "has_lower",   label: "Lowercase a–z"    },
  { key: "has_digit",   label: "Digits 0–9"       },
  { key: "has_special", label: "Special chars"    },
  { key: "no_sequence", label: "No sequences"     },
  { key: "no_repeat",   label: "No repeats"       },
  { key: "no_keyboard", label: "No keyboard walk" },
  { key: "no_common",   label: "No common words"  },
];

function ChecksPanel({ checks }) {
  return (
    <div className="checks-block">
      {CHECK_DEFS.map(({ key, label }) => {
        const ok = checks[key];
        return (
          <div key={key} className={`check-row ${ok ? "ok" : "fail"}`}>
            <span className="check-sym" style={{ color: ok ? "#00ff9d" : "#ff3b5c" }}>
              {ok ? "◆" : "◇"}
            </span>
            <span className="check-lbl">{label}</span>
          </div>
        );
      })}
      <div className="check-row ok">
        <span className="check-sym" style={{ color: "#00d4ff" }}>◆</span>
        <span className="check-lbl">Length: {checks.char_count} chars</span>
      </div>
    </div>
  );
}

// ── Attack Banner ─────────────────────────────────────────────────────────────

function AttackBanner({ cracked, word, duration, wordlistSize }) {
  if (cracked) return (
    <div className="attack-banner cracked">
      <span className="attack-icon">⚡</span>
      <div>
        <div className="attack-title" style={{ color: "#ff3b5c" }}>
          Dictionary Attack — Successful
        </div>
        <div className="attack-sub">
          Matched wordlist entry:&nbsp;
          <span className="attack-word">{word}</span>
        </div>
        <div className="attack-sub" style={{ marginTop: 4 }}>
          Scanned {wordlistSize} entries in {duration} ms
        </div>
      </div>
    </div>
  );

  return (
    <div className="attack-banner secure">
      <span className="attack-icon">🛡</span>
      <div>
        <div className="attack-title" style={{ color: "#00ff9d" }}>
          Dictionary Attack — Repelled
        </div>
        <div className="attack-sub">
          Not found in {wordlistSize}-entry wordlist · {duration} ms
        </div>
      </div>
    </div>
  );
}

// ── Hash Display ──────────────────────────────────────────────────────────────

function HashDisplay({ sha256, sha512, bcrypt }) {
  return (
    <div>
      <div className="hash-block">
        <div className="hash-label">
          <span className="hash-algo-badge">SHA-256</span>
          Cryptographic Hash
        </div>
        <div className="hash-val sha256">{sha256}</div>
      </div>
      <div className="hash-block">
        <div className="hash-label">
          <span className="hash-algo-badge">SHA-512</span>
          Extended Digest
        </div>
        <div className="hash-val sha512">{sha512}</div>
      </div>
      <div className="hash-block">
        <div className="hash-label">
          <span className="hash-algo-badge">BCRYPT</span>
          Adaptive Hash · Work Factor 12
        </div>
        <div className="hash-val bcrypt">{bcrypt}</div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [pw, setPw]           = useState("");
  const [show, setShow]       = useState(false);
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const [error, setError]     = useState("");
  const inputRef              = useRef(null);

  async function runAnalysis() {
    if (!pw.trim()) return;
    setLoading(true);
    setError("");
    setResult(null);

    try {
      const res = await axios.post(`${API}/analyze`, { password: pw });
      setResult(res.data);
    } catch (e) {
      if (e.code === "ERR_NETWORK" || (e.message && e.message.includes("Network"))) {
        setError(
          "Cannot reach backend.\n" +
          "Start it with:  uvicorn main:app --reload --port 8000\n" +
          "Then refresh this page."
        );
      } else {
        const detail = e?.response?.data?.detail;
        setError(Array.isArray(detail)
          ? detail.map(d => d.msg).join(" | ")
          : detail || "Analysis failed. Check backend logs."
        );
      }
    } finally {
      setLoading(false);
    }
  }

  const onKey = e => e.key === "Enter" && runAnalysis();
  const color  = result ? levelColor(result.level) : "var(--amber)";

  return (
    <div className="app">

      {/* ── Header ── */}
      <header className="header">
        <div className="header-top">
          <div className="brand">
            <div className="brand-name">PASSAUDIT</div>
            <div className="brand-tagline">Password Strength Auditor &amp; Dictionary Attack Simulator</div>
          </div>
          <div className="header-meta">
            <div className="meta-author"></div>
            <div className="meta-project">Cyber Security Initiative</div>
          </div>
        </div>
        <div className="header-divider" />
      </header>

      {/* ── Input Panel ── */}
      <div className="panel">
        <div className="panel-bar">
          <div className="led" />
          <span className="bar-label">TERMINAL — SUBMIT TARGET CREDENTIAL</span>
          <span className="bar-status">PORT 8000</span>
        </div>
        <div className="panel-body">

          <div className="input-row">
            <div className="input-prefix">audit@system:~$&nbsp;</div>
            <input
              ref={inputRef}
              type={show ? "text" : "password"}
              className="pw-input"
              placeholder="enter password to audit..."
              value={pw}
              onChange={e => setPw(e.target.value)}
              onKeyDown={onKey}
              autoComplete="off"
              spellCheck="false"
            />
            <button className="btn-toggle" onClick={() => setShow(v => !v)}>
              {show ? "MASK" : "SHOW"}
            </button>
          </div>

          <button className="btn-analyze" onClick={runAnalysis} disabled={loading || !pw.trim()}>
            <div className="btn-analyze-inner">
              <span>{loading ? "SCANNING CREDENTIAL..." : "▶ EXECUTE AUDIT PIPELINE"}</span>
            </div>
          </button>

          {loading && (
            <div>
              <div className="loading-bar" />
              <div className="loading-text">
                RUNNING STRENGTH · HASH · DICTIONARY ATTACK<span className="cur" />
              </div>
            </div>
          )}

          {error && (
            <div className="error-box" style={{ whiteSpace: "pre-line" }}>
              ⚠ ERROR — {error}
            </div>
          )}
        </div>
      </div>

      {/* ── Results ── */}
      {result && (
        <div className="results-enter">

          {/* Strength bar */}
          <div className="panel">
            <div className="panel-bar">
              <div className={`led ${result.score >= 60 ? "green" : result.score >= 40 ? "" : "red"}`} />
              <span className="bar-label">STRENGTH ANALYSIS — STAGE 1</span>
            </div>
            <div className="panel-body">

              <div className="results-grid">
                <ScoreRing score={result.score} level={result.level} />
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div className="entropy-row">
                    <span>ENTROPY</span>
                    <span className="entropy-val">{result.entropy_bits} bits</span>
                  </div>
                  <div className="strength-bar-block">
                    <div className="bar-row">
                      <span className="bar-lbl">SCORE METER</span>
                      <span className="bar-score">{result.score}/100</span>
                    </div>
                    <div className="meter-track">
                      <div className="meter-fill"
                        style={{ width: `${result.score}%`, background: scoreGradient(result.score) }} />
                    </div>
                  </div>
                  <div className="hint-block">
                    <span>💡</span>
                    <span>{result.hint}</span>
                  </div>
                  {result.feedback && result.feedback.length > 0 && (
                    <div className="feedback-list">
                      {result.feedback.slice(0, 3).map((f, i) => (
                        <div key={i} className="fb-item">
                          <span className="fb-arrow">›</span>
                          <span>{f}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>

              <ChecksPanel checks={result.checks} />
            </div>
          </div>

          {/* Attack result */}
          <div className="panel">
            <div className="panel-bar">
              <div className={`led ${result.cracked ? "red" : "green"}`} />
              <span className="bar-label">DICTIONARY ATTACK — STAGE 3</span>
            </div>
            <div className="panel-body">
              <AttackBanner
                cracked     = {result.cracked}
                word        = {result.cracked_word}
                duration    = {result.attack_duration_ms}
                wordlistSize= {result.wordlist_size}
              />

              <div className="stats-row">
                <div className="stat-cell">
                  <span className="stat-num">{result.wordlist_size}</span>
                  <span className="stat-lbl">Wordlist Entries</span>
                </div>
                <div className="stat-cell">
                  <span className="stat-num">{result.attack_duration_ms}</span>
                  <span className="stat-lbl">Attack ms</span>
                </div>
                <div className="stat-cell">
                  <span className="stat-num" style={{ color: result.cracked ? "#ff3b5c" : "#00ff9d" }}>
                    {result.cracked ? "CRACKED" : "SECURE"}
                  </span>
                  <span className="stat-lbl">Result</span>
                </div>
              </div>
            </div>
          </div>

          {/* Hashes */}
          <div className="panel">
            <div className="panel-bar">
              <div className="led" />
              <span className="bar-label">CRYPTOGRAPHIC HASHES — STAGE 2</span>
            </div>
            <div className="panel-body">
              <HashDisplay
                sha256={result.hash_sha256}
                sha512={result.hash_sha512}
                bcrypt={result.hash_bcrypt}
              />
            </div>
          </div>

          {/* All feedback */}
          {result.feedback && result.feedback.length > 3 && (
            <div className="panel">
              <div className="panel-bar">
                <div className="led" />
                <span className="bar-label">RECOMMENDATIONS</span>
              </div>
              <div className="panel-body">
                <div className="feedback-list">
                  {result.feedback.map((f, i) => (
                    <div key={i} className="fb-item">
                      <span className="fb-arrow">›</span>
                      <span>{f}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Footer */}
      <footer className="footer">
        <span>PassAudit</span>
        <span className="footer-credit">◈ Developed by Aftab Husain</span>
        <span>Passwords are never stored · For educational use only</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
